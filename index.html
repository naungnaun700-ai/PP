<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <title>Myanmar Voice Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
        }
        section {
            padding: 40px;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #219150;
        }
    </style>
</head>
<body>

<header>
    <h1>Myanmar Voice Website</h1>
    <p>Welcome to my first GitHub Pages website</p>
</header>

<section>
    <h2>Text to Speech Demo</h2>
    <p>Click the button to hear the voice.</p>
    <button onclick="speak()">Speak</button>
</section>

<script>
function speak() {
    const text = "မင်္ဂလာပါ။ Myanmar Voice Website မှ ကြိုဆိုပါတယ်။";
    const speech = new SpeechSynthesisUtterance(text);
    speech.lang = "my-MM";
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
