<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myanmar Voice Website</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        textarea { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; padding: 15px 30px; border: none; border-radius: 50px; cursor: pointer; font-size: 18px; margin-top: 20px; width: 100%; font-weight: bold; }
        button:hover { background-color: #218838; }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Myanmar TTS</h1>
        <p>စာရိုက်ပြီး အသံနားထောင်ပါ</p>

        <textarea id="text-input" rows="5" placeholder="ဒီမှာ မြန်မာလို ရိုက်ပါ..."></textarea>
        <br>
        <button id="speak-btn">🔊 Listen (နားထောင်မယ်)</button>
    </div>

    <script>
        const speakBtn = document.querySelector('#speak-btn');
        const textInput = document.querySelector('#text-input');

        speakBtn.addEventListener('click', () => {
            const text = textInput.value;
            if (text.trim() !== "") {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'my-MM'; 
                window.speechSynthesis.speak(utterance);
            } else {
                alert("စာသားတစ်ခုခု အရင်ရိုက်ပေးပါခင်ဗျာ။");
            }
        });
    </script>
</body>
</html>
